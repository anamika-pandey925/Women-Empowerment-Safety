<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Suraksha - Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect hack
    // When GitHub Pages serves a 404 for any route (e.g. /Women-Empowerment-Safety/some-page),
    // this script redirects to the main index.html with the original path preserved
    // as a query parameter, so the SPA router can handle it.
    var pathSegmentsToKeep = 1; // Keep '/Women-Empowerment-Safety' as the base
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p>Redirecting&hellip;</p>
</body>
</html>
